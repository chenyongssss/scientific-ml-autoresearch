name: advection_minimal
description: Minimal iterative workflow for a toy 1D advection benchmark.
workspace: .
commands:
  train: "python train.py --config {config_path} --output-dir {run_dir}"
  eval: "python evaluate.py --run-dir {run_dir}"
metrics:
  primary:
    - rel_l2
  secondary:
    - conservation_error
    - runtime_seconds
search_space:
  model.width: [32, 64]
  model.depth: [2, 3]
  training.lr: [0.001, 0.0005]
  loss.conservation_weight: [0.0, 0.01]
planner:
  strategy: heuristic
  baseline:
    model.width: 32
    model.depth: 2
    training.lr: 0.001
    loss.conservation_weight: 0.0
budget:
  max_runs_per_round: 4
  max_rounds: 3
reporting:
  sort_by: rel_l2
  lower_is_better: true
seeds: [0, 1]
evaluation_regimes:
  - name: default-grid
    description: Standard resolution and interpolation setting.
  - name: harder-grid
    description: Slightly more challenging evaluation on a shifted grid.
constraints:
  - name: conservation
    description: Keep mass drift small enough to support a conservative claim.
    metric: conservation_error
    threshold: 0.001
    direction: lower_is_better
  - name: stable long-time behavior
    description: Still tracked as a named reminder until a concrete metric is added.
robustness_checks:
  - name: shifted-grid
    description: Validate on a mildly shifted grid.
    eval_command: "python evaluate_shifted.py --run-dir {run_dir} --output {output_path}"
    output_file: shifted_grid.json
    metrics: [rel_l2_shifted, conservation_error_shifted]
  - name: noisy-observation
    description: Add mild observation noise during evaluation.
notes:
  - prefer stable training
  - prioritize conservation-related observations
